<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PRESTIGE — Digital Library{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth">
        <section class="auth-visual" aria-hidden="true">
            <div class="auth-visual-copy">
                <h2>{% block visual_heading %}Your library, wherever you are.{% endblock %}</h2>
                <p>{% block visual_sub %}Search the catalogue, borrow and return books, and keep track of every due date from one place.{% endblock %}</p>
            </div>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <div class="auth-brand">
                    <span class="brand-mark">P</span>
                    <span class="brand-word">PRESTIGE</span>
                </div>

                {% include "_flash.html" %}
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
