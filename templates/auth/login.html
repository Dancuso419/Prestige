{% extends "auth/auth_base.html" %}
{% block title %}Log in — PRESTIGE{% endblock %}
{% block content %}
<h1>Log in to your account</h1>
<p class="subtitle">Welcome back. Enter your Student or Staff ID to continue.</p>

<form method="POST" class="auth-form">
    {{ csrf_field()|safe }}
    <div class="form-group">
        <label for="student_id">Student / Staff ID</label>
        <input type="text" id="student_id" name="student_id" required autofocus autocomplete="username" placeholder="e.g. STU2024001">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <div class="password-field">
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            <button type="button" class="pw-toggle" data-target="password" aria-label="Show password">
                <svg class="ico-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="ico-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.4 5.2A9.5 9.5 0 0 1 12 5c6.5 0 10 7 10 7a15 15 0 0 1-3.3 4M6.2 6.2A15 15 0 0 0 2 12s3.5 7 10 7a9.4 9.4 0 0 0 3.4-.6"/></svg>
            </button>
        </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full">Log in</button>
</form>

<p class="auth-hint">Accounts are provisioned by your library administrator.</p>
{% endblock %}
